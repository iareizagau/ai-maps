{% load i18n %}
<!-- Sidebar -->
<div class="hidden md:flex flex-col w-full md:w-[400px] lg:w-[450px] h-full bg-slate-50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 shadow-xl z-10 flex-shrink-0" id="sidebar">
    <div class="p-4 border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md">
        <h2 class="text-2xl font-bold mb-1 text-slate-900 dark:text-slate-100">{% trans "Cultura Local" %}</h2>
        <p class="text-slate-600 dark:text-slate-400 mb-4 text-sm leading-tight">{% trans "Mueve el mapa para ver los eventos en esa zona." %}</p>
        
        <!-- Filters -->
        <div class="space-y-3">
            <!-- Categories -->
            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide" id="category-filters">
                <button class="filter-btn active flex items-center gap-2" data-filter="all" onclick="setCategory('all')">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                    {% trans "Todas" %}
                </button>
            </div>
            <!-- Dates -->
            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide" id="date-filters">
                <button class="filter-btn active flex items-center gap-2" data-filter="all" onclick="setDate('all')">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    {% trans "Cualquier fecha" %}
                </button>
                <button class="filter-btn inactive flex items-center gap-2" data-filter="today" onclick="setDate('today')">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.364 17.636l-.707.707M6.364 6.364l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>
                    {% trans "Hoy" %}
                </button>
                <button class="filter-btn inactive flex items-center gap-2" data-filter="weekend" onclick="setDate('weekend')">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
                    {% trans "Este finde" %}
                </button>
            </div>
        </div>
    </div>
    
    <div id="events-list" class="flex-1 overflow-y-auto p-4 space-y-4">
        <p class="text-slate-500 italic">{% trans "Cargando eventos en el mapa..." %}</p>
    </div>
</div>
