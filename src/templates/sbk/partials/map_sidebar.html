{% load i18n %}
<!-- Sidebar -->
<div class="hidden md:flex flex-col w-full md:w-3/5 lg:w-[60%] xl:w-[65%] h-full bg-slate-50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 shadow-xl z-10 flex-shrink-0 transition-all duration-500" id="sidebar">
    <div class="p-4 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
        <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🔥</span>
                    <h1 class="text-xl font-black text-slate-900 dark:text-slate-100 tracking-tight">{{ page_h1|default:'SBK HUB' }}</h1>
                </div>
                <div class="flex items-center gap-2">
                    <div id="view-mode-toggle" class="flex p-0.5 bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">
                        <button onclick="setViewMode('map')" id="view-map" class="p-1 rounded-md transition-all bg-white dark:bg-slate-700 shadow-sm text-rose-600">
                            <i data-lucide="map" class="w-4 h-4"></i>
                        </button>
                        <button onclick="setViewMode('list')" id="view-list" class="p-1 rounded-md transition-all text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i>
                        </button>
                    </div>
                    {% if user.is_authenticated %}
                        <a href="{% url 'sbk:passport' %}" class="bg-slate-900 text-white dark:bg-white dark:text-slate-900 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-tighter hover:scale-105 transition-transform shadow-md">
                            Passport
                        </a>
                    {% endif %}
                </div>
            </div>

            <!-- Quick Navigation Phase 2 -->
            <div class="flex items-center gap-3 py-1">
                <a href="{% url 'sbk:person_directory' %}" class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 hover:text-rose-600 uppercase tracking-widest transition-colors">
                    <i data-lucide="users" class="w-3 h-3"></i>
                    {% translate "Directorio" %}
                </a>
                <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                <a href="{% url 'sbk:practice' %}" class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 hover:text-rose-600 uppercase tracking-widest transition-colors">
                    <i data-lucide="message-square" class="w-3 h-3"></i>
                    {% translate "Comunidad" %}
                </a>
                <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                <a href="{% url 'sbk:tonight' %}" class="flex items-center gap-1.5 text-[10px] font-black text-rose-600 hover:text-rose-700 uppercase tracking-widest transition-colors">
                    <i data-lucide="flame" class="w-3 h-3"></i>
                    {% translate "Hoy" %}
                </a>
            </div>
            
            <div class="flex gap-2">
                <!-- Hybrid Search Bar -->
                <div class="relative flex-1">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-3.5 w-3.5 text-slate-400"></i>
                    </div>
                    <input type="text" id="event-search" oninput="updateSearch(this.value)" placeholder="{% translate 'Busca eventos, salas o ciudades...' %}" class="block w-full pl-9 pr-3 py-1.5 border border-slate-200 dark:border-slate-700 rounded-xl leading-5 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-rose-500 text-xs transition-all shadow-sm">
                </div>
                <button onclick="toggleFilters()" id="filters-toggle-btn" class="px-3 py-1.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-500 hover:text-rose-600 transition-colors">
                    <i data-lucide="filter" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    {% include "sbk/partials/map_filters.html" %}
    
    <div id="events-list" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-max transition-all duration-300">
        <p class="text-slate-500 italic col-span-full">{% translate "Cargando la magia en el mapa..." %}</p>
    </div>
</div>
