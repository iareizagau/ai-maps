{% extends "pintxos/base.html" %}

{% block title %}Login - Pintxos.eus{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-gray-900 dark:bg-gray-900 light:bg-white border border-gray-800 dark:border-gray-800 light:border-gray-200 rounded-lg p-8">
    <h1 class="text-2xl font-bold text-white dark:text-white light:text-gray-900 mb-6 text-center">Inicia Sesión</h1>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label for="username" class="block text-sm font-medium text-gray-300 dark:text-gray-300 light:text-gray-700 mb-2">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          class="w-full px-4 py-2 rounded-lg bg-gray-800 dark:bg-gray-800 light:bg-white border border-gray-700 dark:border-gray-700 light:border-gray-300 text-white dark:text-white light:text-gray-900 placeholder-gray-500 dark:placeholder-gray-500 light:placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
          required
        >
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 dark:text-gray-300 light:text-gray-700 mb-2">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          class="w-full px-4 py-2 rounded-lg bg-gray-800 dark:bg-gray-800 light:bg-white border border-gray-700 dark:border-gray-700 light:border-gray-300 text-white dark:text-white light:text-gray-900 placeholder-gray-500 dark:placeholder-gray-500 light:placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
          required
        >
      </div>

      {% if form.non_field_errors %}
        <div class="bg-red-900/20 dark:bg-red-900/20 light:bg-red-100 border border-red-700 dark:border-red-700 light:border-red-300 rounded-lg p-3 text-red-400 dark:text-red-400 light:text-red-700 text-sm">
          {% for error in form.non_field_errors %}
            <p>{{ error }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <button
        type="submit"
        class="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition"
      >
        Entrar
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-400 dark:text-gray-400 light:text-gray-600">
      ¿No tienes cuenta?
      <a href="{% url 'register' %}" class="text-indigo-400 dark:text-indigo-400 light:text-indigo-600 hover:text-indigo-300 dark:hover:text-indigo-300 light:hover:text-indigo-700">Crea una aquí</a>
    </div>
  </div>
</div>
{% endblock %}
