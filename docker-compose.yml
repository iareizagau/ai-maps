# Pinning the compose project name keeps volumes/networks namespaced as
# `ai-maps_*` regardless of the working directory. Required on shared VPSs where
# CI may check out the repo under a different path.
name: ai-maps

services:
  db:
    image: timescale/timescaledb-ha:pg15
    environment:
      POSTGRES_DB: maps_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maps_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      # timescale/timescaledb-ha:pg15 stores its data in /home/postgres/pgdata/data
      # (verified with SHOW data_directory). Mounting the named volume there is
      # the only way persistence survives `docker compose run` recreating the
      # container. The legacy /var/lib/postgresql/data path used by stock postgres
      # images is wrong for this image.
      - postgres_data:/home/postgres/pgdata/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  web:
    build: .
    image: maps-app:latest
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: maps-app:latest
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    image: maps-app:latest
    command: celery -A config beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
