{# Stat Card - Cotton Molecule #}
<div class="bg-gray-900 dark:bg-gray-900 light:bg-white border border-gray-800 dark:border-gray-800 light:border-gray-200 rounded-lg p-6 text-center hover:border-indigo-500 transition {{ class|default:'' }}">
    <p class="text-4xl font-bold text-white dark:text-white light:text-gray-900 mb-2">{{ stat_value }}</p>
    <p class="text-gray-400 dark:text-gray-400 light:text-gray-600">{{ stat_label }}</p>
</div>
