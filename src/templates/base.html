{% load static %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'eu' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Maps.eus{% endblock %}</title>

    <link rel="preload" href="{% static 'fonts/InterVariable.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">

    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script defer src="{% static 'js/alpine.min.js' %}"></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 dark:bg-[#0b0e14] text-slate-900 dark:text-gray-100 font-sans selection:bg-indigo-500/30 transition-colors duration-300">

    <div class="min-h-screen flex flex-col">
        <c-organisms.navbar />

        <main class="flex-grow">
            {% block content %}{% endblock %}
        </main>

        <footer class="border-t border-white/5 py-8 px-6 text-center text-xs text-gray-500">
            <p>&copy; 2026 Maps.eus - Euskal Herriko GIS Ekosistema</p>
        </footer>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
