{% load i18n %}
<c-layouts.main title="ZBE Maps - {% trans 'Zonas de Bajas Emisiones' %}">
  <c-slot name="extra_head">
    <!-- Leaflet & Geoman -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />  
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    
    <style>
      .leaflet-container { font-family: inherit; }
      .dark .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }
      [x-cloak] { display: none !important; }
    </style>
  </c-slot>

  {{ zones_geojson|json_script:"zones-data" }}
  <div class="flex flex-col md:flex-row h-[calc(100vh-64px)] overflow-hidden" x-data="zbeApp()">
    
    <!-- Sidebar -->
    <aside class="w-full md:w-[450px] flex flex-col bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-white/5 z-20 shadow-2xl transition-all overflow-hidden">
      
      <!-- Header -->
      <div class="p-6 bg-gradient-to-br from-indigo-600 to-purple-700 text-white relative overflow-hidden">
        <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        <div class="flex justify-between items-start relative z-10">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center">
              <i data-lucide="leaf"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight">ZBE Maps</h1>
          </div>
        </div>
        <p class="text-sm text-indigo-100 font-medium opacity-90 mb-4 relative z-10">
          {% trans "Diseño y gestión de Zonas de Bajas Emisiones" %}
        </p>
      </div>

      <!-- Controls & List -->
      <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-lg font-bold text-slate-800 dark:text-white">{% trans "Polígonos" %}</h3>
          <button @click="enableDrawing()" class="px-3 py-1.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold rounded-lg text-xs hover:bg-indigo-100 transition-colors flex items-center gap-2">
            <i data-lucide="pen-tool" class="w-4 h-4"></i> {% trans "Dibujar ZBE" %}
          </button>
        </div>

        <template x-if="drawnLayers.length === 0">
          <div class="text-center p-8 border-2 border-dashed border-slate-200 dark:border-white/10 rounded-2xl">
            <div class="w-12 h-12 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-400">
              <i data-lucide="map" class="w-6 h-6"></i>
            </div>
            <p class="text-sm text-slate-500">{% trans "No hay ninguna zona trazada. Pulsa en dibujar para empezar." %}</p>
          </div>
        </template>

        <div class="space-y-3">
          <template x-for="(layerInfo, index) in drawnLayers" :key="layerInfo.id">
            <div class="p-4 rounded-xl border border-slate-100 dark:border-white/5 bg-slate-50 dark:bg-slate-800/50 hover:border-indigo-500/30 transition-all group">
              <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-lg bg-indigo-500/20 text-indigo-500 flex items-center justify-center">
                    <i data-lucide="hexagon" class="w-4 h-4"></i>
                  </div>
                  <div>
                    <h4 class="text-sm font-bold text-slate-900 dark:text-white" x-text="layerInfo.name || ('Zona ' + (index + 1))"></h4>
                    <span class="text-[10px] text-slate-500 font-mono" x-text="layerInfo.area + ' m²'"></span>
                  </div>
                </div>
                <div class="flex gap-2">
                  <button @click="focusLayer(layerInfo.id)" class="p-1.5 text-slate-400 hover:text-indigo-500 transition-colors">
                    <i data-lucide="crosshair" class="w-4 h-4"></i>
                  </button>
                  <button @click="deleteLayer(layerInfo.id)" class="p-1.5 text-slate-400 hover:text-rose-500 transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Action Footer -->
      <div class="p-4 border-t border-slate-100 dark:border-white/5 bg-slate-50/50 dark:bg-slate-800/30">
        <button @click="saveZones()" :disabled="drawnLayers.length === 0" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-xl shadow-xl shadow-indigo-600/20 transition-all active:scale-95 flex items-center justify-center gap-2">
          <i data-lucide="save" class="w-4 h-4"></i>
          {% trans "Guardar Zonas" %}
        </button>
      </div>
    </aside>

    <!-- Map Area -->
    <main class="flex-1 relative">
      <div id="zbe-map" class="w-full h-full z-0 bg-slate-100 dark:bg-slate-900"></div>
    </main>

  </div>

  <script>
    function zbeApp() {
      return {
        map: null,
        drawnLayers: [],
        layerObjects: {},
        initialZones: null,

        init() {
          try {
            this.initialZones = JSON.parse(document.getElementById('zones-data').textContent);
          } catch(e) {
            console.error("No se pudo cargar el JSON de zonas", e);
          }
          this.$nextTick(() => {
            this.initMap();
            // Iniciar iconos de lucide
            setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 100);
          });
        },

        initMap() {
          if (this.map) return;
          
          // Euskadi center aprox
          this.map = L.map('zbe-map', {
            zoomControl: false,
          }).setView([42.8467, -2.6716], 9);

          L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
          }).addTo(this.map);

          L.control.zoom({ position: 'bottomright' }).addTo(this.map);

          // Configurar Geoman
          this.map.pm.addControls({
            position: 'topright',
            drawMarker: false,
            drawCircleMarker: false,
            drawPolyline: false,
            drawRectangle: false,
            drawCircle: false,
            drawText: false,
            editMode: true,
            dragMode: true,
            cutPolygon: false,
            removalMode: true,
          });

          // Personalizar estilo por defecto de dibujo
          this.map.pm.setPathOptions({
            color: '#4f46e5', // indigo-600
            fillColor: '#6366f1', // indigo-500
            fillOpacity: 0.3,
            weight: 3,
          });

          // Escuchar eventos de creación
          this.map.on('pm:create', (e) => {
            const layer = e.layer;
            const id = L.stamp(layer);
            layer.pm.enable(); // Hacerlo editable al instante
            
            this.layerObjects[id] = layer;
            this.updateLayerInfo(id, layer, 'Nueva Zona');

            // Escuchar cambios (edición)
            layer.on('pm:edit', () => this.updateLayerInfo(id, layer));
            layer.on('pm:dragend', () => this.updateLayerInfo(id, layer));
            layer.on('pm:remove', () => this.handleLayerRemoval(id));
          });
          
          this.map.on('pm:remove', (e) => {
             const id = L.stamp(e.layer);
             this.handleLayerRemoval(id);
          });

          // Load initial zones if any
          if (this.initialZones && this.initialZones.features) {
            let bounds = L.latLngBounds();
            
            L.geoJSON(this.initialZones, {
              style: {
                color: '#4f46e5',
                fillColor: '#6366f1',
                fillOpacity: 0.3,
                weight: 3,
              },
              onEachFeature: (feature, layer) => {
                const id = L.stamp(layer);
                this.layerObjects[id] = layer;
                
                layer.on('pm:edit', () => this.updateLayerInfo(id, layer));
                layer.on('pm:dragend', () => this.updateLayerInfo(id, layer));
                layer.on('pm:remove', () => this.handleLayerRemoval(id));
                
                this.updateLayerInfo(id, layer, feature.properties.name);
                bounds.extend(layer.getBounds());
              }
            }).addTo(this.map);
            
            // Adjust map view to show all loaded polygons
            if (Object.keys(this.layerObjects).length > 0) {
              this.map.fitBounds(bounds, { padding: [20, 20] });
            }
          }
        },

        enableDrawing() {
          this.map.pm.enableDraw('Polygon', {
            snappable: true,
            snapDistance: 20,
          });
        },

        updateLayerInfo(id, layer, givenName) {
          // Calcular el area aproximada (solo para fines de visualización rápida)
          // Geoman no calcula area por defecto, usamos una aproximación simple o la dejamos como placeholder.
          // Para cálculo real usaríamos turf.js, pero para demo usaremos un mock rápido.
          const latLngs = layer.getLatLngs()[0];
          let bounds = layer.getBounds();
          let area = "N/A"; // Idealmente Turf.js area()
          
          const existingIndex = this.drawnLayers.findIndex(l => l.id === id);
          const data = {
            id: id,
            name: givenName || (existingIndex >= 0 ? this.drawnLayers[existingIndex].name : null),
            area: 0 // Placeholder
          };

          if (existingIndex >= 0) {
            this.drawnLayers[existingIndex] = data;
          } else {
            this.drawnLayers.push(data);
          }
          
          // Refrescar Alpine e Iconos
          this.refreshUI();
        },

        handleLayerRemoval(id) {
          this.drawnLayers = this.drawnLayers.filter(l => l.id !== id);
          delete this.layerObjects[id];
        },

        deleteLayer(id) {
          const layer = this.layerObjects[id];
          if (layer) {
            this.map.removeLayer(layer);
            this.handleLayerRemoval(id);
          }
        },

        focusLayer(id) {
          const layer = this.layerObjects[id];
          if (layer) {
            this.map.fitBounds(layer.getBounds(), { padding: [50, 50], animate: true });
          }
        },

        async saveZones() {
          const geojsonArray = [];
          for (let id in this.layerObjects) {
            const geojson = this.layerObjects[id].toGeoJSON();
            
            const existingIndex = this.drawnLayers.findIndex(l => l.id === id);
            if (existingIndex >= 0) {
              geojson.properties = {
                name: 'Zona ' + (existingIndex + 1)
              };
            }
            geojsonArray.push(geojson);
          }
          
          const featureCollection = {
            type: "FeatureCollection",
            features: geojsonArray
          };
          
          try {
            const response = await fetch('{% url "zbe:save_zones" %}', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': this.getCookie('csrftoken')
              },
              body: JSON.stringify(featureCollection)
            });
            
            const data = await response.json();
            if (data.status === 'success') {
              alert('¡Zonas guardadas correctamente! (' + data.saved + ' guardadas)');
            } else {
              alert('Error al guardar: ' + data.message);
            }
          } catch (error) {
            console.error(error);
            alert('Error de red al guardar.');
          }
        },

        getCookie(name) {
          let cookieValue = null;
          if (document.cookie && document.cookie !== '') {
              const cookies = document.cookie.split(';');
              for (let i = 0; i < cookies.length; i++) {
                  const cookie = cookies[i].trim();
                  if (cookie.substring(0, name.length + 1) === (name + '=')) {
                      cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                      break;
                  }
              }
          }
          return cookieValue;
        },
        
        refreshUI() {
          this.$nextTick(() => {
              if (typeof lucide !== 'undefined') lucide.createIcons();
          });
        }
      }
    }
  </script>
</c-layouts.main>
