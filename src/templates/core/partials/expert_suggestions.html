{% load i18n %}

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for expert in suggested_experts %}
    <div class="glass p-4 rounded-xl flex items-center justify-between group transition-all hover:border-primary/30">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="h-12 w-12 rounded-full bg-slate-700 flex items-center justify-center border border-white/10 overflow-hidden">
                    {% if expert.avatar %}
                        <img src="{{ expert.avatar.url }}" alt="{{ expert.username }}" class="h-full w-full object-cover">
                    {% else %}
                        <span class="text-slate-400 font-bold text-lg">{{ expert.username|slice:":1"|upper }}</span>
                    {% endif %}
                </div>
                <div class="absolute -bottom-1 -right-1 bg-yellow-500 rounded-full p-1 border-2 border-slate-900" title="{% trans 'Top Contributor' %}">
                    <svg class="h-2 w-2 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                </div>
            </div>
            <div>
                <p class="text-sm font-bold text-white">{{ expert.username }}</p>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">{{ expert.follower_count }} {% trans "Followers" %}</p>
            </div>
        </div>
        
        <div x-data="{ followed: {% if expert.id in followed_ids %}true{% else %}false{% endif %} }">
            <span x-show="followed" class="text-green-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </span>
            <button x-show="!followed"
                    hx-post="/api/follow/{{ expert.id }}/pintxos"
                    hx-swap="none"
                    @click="followed = true"
                    class="p-2 rounded-lg bg-white/5 text-slate-400 hover:bg-primary hover:text-white transition-all">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
