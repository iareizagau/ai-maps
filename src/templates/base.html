<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'eu' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Maps.eus{% endblock %}</title>
    
    <!-- Modern Stack -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1', // indigo-500
                        primary_hover: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark .glass {
            background: rgba(17, 24, 39, 0.7);
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 dark:bg-[#0b0e14] text-slate-900 dark:text-gray-100 font-sans selection:bg-indigo-500/30 transition-colors duration-300">
    
    <div class="min-h-screen flex flex-col">
        <!-- Navigation -->
        <c-organisms.navbar />

        <!-- Main Content -->
        <main class="flex-grow">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="border-t border-white/5 py-8 px-6 text-center text-xs text-gray-500">
            <p>&copy; 2024 Maps.eus - Euskal Herriko GIS Ekosistema</p>
        </footer>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
