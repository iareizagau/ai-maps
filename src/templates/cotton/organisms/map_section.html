{% load i18n %}
<div id="map-section" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 scroll-mt-24">
    <div class="flex items-center justify-between mb-8">
        <div class="space-y-1">
            <h2 class="text-3xl font-bold text-white">{% trans "Culinary Map" %}</h2>
            <p class="text-gray-400 text-sm">{% trans "Click anywhere on the map to add a new bar or restaurant" %}</p>
        </div>
    </div>
    <div class="relative">
        <div id="map" style="height: 500px; width: 100%;" class="shadow-2xl shadow-indigo-500/10 border border-white/5"></div>
        <div class="absolute top-4 right-4 z-[1000]">
            <c-atoms.card variant="glass" class="p-3 text-[10px] font-bold text-gray-300 uppercase tracking-widest">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                    {% trans "Live Data" %}
                </div>
            </c-atoms.card>
        </div>
    </div>
</div>
