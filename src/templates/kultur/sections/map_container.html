{% load i18n %}
<!-- Map Container -->
<div class="w-full flex-1 h-full relative" id="map-container">
    <div id="map"></div>
    <!-- Mobile Search & Filter Bar Overlay -->
    <div class="md:hidden absolute top-4 left-4 right-16 z-[1000]">
        <div class="flex gap-2">
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
                <input type="text" id="mobile-event-search" oninput="syncSearch(this.value)" placeholder="{% trans 'Busca eventos...' %}" class="block w-full pl-9 pr-3 py-2 border border-slate-200/50 dark:border-slate-700/50 rounded-2xl leading-5 bg-white/90 dark:bg-slate-800/90 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary text-xs transition-all shadow-xl backdrop-blur-md">
            </div>
            <button onclick="toggleMobileFilters()" class="p-2 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-2xl border border-slate-200/50 dark:border-slate-700/50 shadow-xl text-slate-500 hover:text-primary transition-colors">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
            </button>
        </div>
    </div>

    <!-- Weather & Theme Toggle Overlay -->
    <div class="absolute top-4 right-4 z-[1000] flex flex-col items-end gap-2">
        <c-molecules.theme_toggle />

        <!-- Premium Weather Pill (visible on mobile too) -->
        <button id="weather-widget" type="button" onclick="toggleWeatherSheet()" class="flex items-center gap-2 px-3 py-1.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-lg rounded-2xl border border-slate-200/50 dark:border-slate-700/50 shadow-xl transition-all duration-500 hover:scale-105 cursor-pointer">
            <div class="flex items-center gap-1.5 md:border-r md:border-slate-200 md:dark:border-slate-700 md:pr-2">
                <span id="weather-icon" class="text-sm drop-shadow-sm">--</span>
                <span class="text-xs font-black text-slate-800 dark:text-slate-100" id="weather-temp">--°</span>
            </div>
            <div class="hidden md:flex flex-col text-left">
                <span class="text-[9px] uppercase tracking-widest font-bold text-slate-400 dark:text-slate-500 leading-none mb-0.5">{% trans "Clima en" %}</span>
                <span class="text-[11px] font-bold text-slate-700 dark:text-slate-300 max-w-[100px] truncate leading-none" id="weather-location">{% trans "..." %}</span>
            </div>
            <svg class="w-3 h-3 text-slate-400 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
        </button>
    </div>

    <!-- Weather Bottom Sheet -->
    <div id="weather-sheet-backdrop" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[3000]" onclick="toggleWeatherSheet()"></div>
    <div id="weather-sheet" class="hidden fixed bottom-0 left-0 right-0 md:left-auto md:right-4 md:bottom-4 md:max-w-md md:rounded-3xl rounded-t-3xl bg-white dark:bg-slate-900 shadow-2xl border border-slate-200 dark:border-slate-800 z-[3001] max-h-[80vh] overflow-y-auto">
        <div class="sticky top-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 px-5 py-4 flex items-center justify-between">
            <div>
                <p class="text-[10px] uppercase tracking-widest font-black text-slate-400">{% trans "Clima en" %}</p>
                <p class="text-base font-bold text-slate-900 dark:text-slate-100" id="weather-sheet-location">--</p>
            </div>
            <button onclick="toggleWeatherSheet()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Weekend brief -->
        <div class="p-5 border-b border-slate-100 dark:border-slate-800">
            <p class="text-[11px] uppercase tracking-widest font-black text-slate-400 mb-3">{% trans "Tu finde por el tiempo" %}</p>
            <div id="weather-weekend" class="space-y-2">
                <p class="text-xs text-slate-400 italic">{% trans "Cargando..." %}</p>
            </div>
        </div>

        <!-- 5-day strip -->
        <div class="p-5">
            <p class="text-[11px] uppercase tracking-widest font-black text-slate-400 mb-3">{% trans "Próximos días" %}</p>
            <div id="weather-days" class="space-y-1.5">
                <p class="text-xs text-slate-400 italic">{% trans "Cargando..." %}</p>
            </div>
        </div>
    </div>
</div>

<!-- Mobile Toggle List Button (Always on top) -->
<div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[3000]">
    <button id="mobile-toggle-btn" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-3 rounded-full font-bold shadow-2xl flex items-center gap-2 border border-slate-700 dark:border-slate-300">
        <span id="mobile-toggle-text">{% trans "Ver lista" %}</span>
        <span id="mobile-count" class="bg-primary text-white text-xs px-2 py-0.5 rounded-full shadow-inner">0</span>
    </button>
</div>
