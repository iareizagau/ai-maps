services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maps_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.prod}
    mem_limit: ${DB_MEM_LIMIT:-1g}
    cpus: ${DB_CPUS:-1.0}

  redis:
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-192m}
    cpus: ${REDIS_CPUS:-0.25}

  web:
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -
    ports:
      - "127.0.0.1:8060:8000"
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    mem_limit: ${WEB_MEM_LIMIT:-768m}
    cpus: ${WEB_CPUS:-1.0}

  worker:
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    mem_limit: ${WORKER_MEM_LIMIT:-768m}
    cpus: ${WORKER_CPUS:-1.0}

  beat:
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    mem_limit: ${BEAT_MEM_LIMIT:-128m}
    cpus: ${BEAT_CPUS:-0.25}
