<c-vars title="" description="" icon="" url="" badge_text="" accent_color="#f97316" />

<a href="{{ url }}" 
   class="group relative overflow-hidden glass p-8 rounded-[32px] border border-slate-200/50 dark:border-white/10 transition-all duration-500 flex flex-col justify-between h-[320px] hover:-translate-y-2 hover:shadow-2xl"
   style="--accent-color: {{ accent_color }};">
    
    <!-- Background Decor -->
    <div class="absolute -right-4 -top-4 w-24 h-24 rounded-full blur-2xl opacity-10 group-hover:opacity-20 transition-opacity"
         style="background-color: var(--accent-color);"></div>
    
    <div class="relative z-10">
        <!-- Icon -->
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl mb-6 group-hover:scale-110 group-hover:rotate-3 transition-all duration-500"
             style="background-color: color-mix(in srgb, var(--accent-color) 15%, transparent); color: var(--accent-color);">
            <i data-lucide="{{ icon }}"></i>
        </div>
        
        <!-- Content -->
        <h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-3 tracking-tight group-hover:text-[var(--accent-color)] transition-colors"
            style="--tw-text-opacity: 1; color: var(--accent-color, inherit);">
            {{ title }}
        </h3>
        <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed line-clamp-3">
            {{ description }}
        </p>
    </div>
    
    <!-- Footer -->
    <div class="mt-6 flex items-center justify-between relative z-10">
        {% if badge_text %}
        <span class="text-[10px] uppercase tracking-widest font-bold px-3 py-1 rounded-full border"
              style="background-color: color-mix(in srgb, var(--accent-color) 10%, transparent); color: var(--accent-color); border-color: color-mix(in srgb, var(--accent-color) 20%, transparent);">
            {{ badge_text }}
        </span>
        {% endif %}
        
        <div class="w-8 h-8 rounded-full border border-slate-200 dark:border-white/10 flex items-center justify-center group-hover:border-[var(--accent-color)] transition-all duration-500"
             style="--accent-hover-bg: var(--accent-color);">
            <style>
                .group:hover .arrow-circle { background-color: var(--accent-color); border-color: var(--accent-color); }
                .group:hover .arrow-icon { color: white; }
            </style>
            <div class="arrow-circle w-full h-full rounded-full flex items-center justify-center transition-all duration-500">
                <i data-lucide="arrow-right" class="arrow-icon w-4 h-4 text-slate-400 transition-colors"></i>
            </div>
        </div>
    </div>
</a>
