{% load static i18n %}
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  const currentLang =
    JSON.parse(document.getElementById("current-language").textContent) || "es";
  const langSuffix = currentLang === "eu" ? "eu" : "es";

  // Dynamic field names
  const titleField = `title_${langSuffix}`;
  const descField = `description_${langSuffix}`;
  const urlField = `url_${langSuffix}`;
  const typeField = `event_type_${langSuffix}`;
  const venueField = `venue_name_${langSuffix}`;
  const municipalityField = `municipality_${langSuffix}`;
  const hoursField = `opening_hours_${langSuffix}`;
  const priceField = `price_${langSuffix}`;
  const purchaseUrlField = `purchase_url_${langSuffix}`;

  // Translations for JS strings
  const translations = {
    es: {
      seeMap: "Ver mapa",
      seeList: "Ver lista",
      loading: "Cargando eventos en el mapa...",
      noEvents: "No hay eventos en esta zona con los filtros actuales.",
      tryZoom: "Prueba a alejar el mapa o quitar filtros.",
      unknownDate: "Fecha por confirmar",
      cultural: "Cultural",
      price: "Precio",
      hours: "Horario",
      buy: "Comprar entradas",
      saturday: "Sábado",
      sunday: "Domingo",
      eventsOutdoor: "al aire libre",
      eventsIndoor: "de interior",
      eventsAll: "eventos",
      noWeekendData: "Aún no hay datos del finde.",
      noForecast: "Sin previsión disponible.",
    },
    eu: {
      seeMap: "Mapa ikusi",
      seeList: "Zerrenda ikusi",
      loading: "Ekitaldiak mapan kargatzen...",
      noEvents: "Ez dago ekitaldirik eremu honetan hautatutako iragazkiekin.",
      tryZoom: "Saiatu mapa urruntzen edo iragazkiak kentzen.",
      unknownDate: "Data baieztatzeke",
      cultural: "Kulturala",
      price: "Prezioa",
      hours: "Ordutegia",
      buy: "Sarrerak erosi",
      saturday: "Larunbata",
      sunday: "Igandea",
      eventsOutdoor: "kanpoaldekoak",
      eventsIndoor: "barrukoak",
      eventsAll: "ekitaldi",
      noWeekendData: "Oraindik ez dago asteburuko daturik.",
      noForecast: "Iragarpenik ez.",
    },
  };
  const t = translations[currentLang] || translations.es;

  // Weather state — populated by /api/weather.json
  let weatherData = null;       // { days: [{date, temp_max, temp_min, condition, icon, rain_mm}], location, now }
  let weatherByDate = {};       // map date_iso -> day object
  const weatherLocaleTag = currentLang === "eu" ? "eu-ES" : "es-ES";
  const RAINY_CONDITIONS = new Set(["Rain", "Drizzle", "Thunderstorm", "Snow"]);

  let allFeatures = [];
  let geoJsonLayer = null;
  let currentCategory = "all";
  let currentDate = "all";
  let currentSearch = "";
  let activeMoods = new Set();
  let map;
  let isListView = false;

  document.addEventListener("DOMContentLoaded", function () {
    map = L.map("map", { zoomControl: false }).setView([43.0, -2.5], 9);
    L.control.zoom({ position: "bottomright" }).addTo(map);

    const lightTiles = L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      {
        attribution: "&copy; OpenStreetMap contributors",
        subdomains: "abcd",
        maxZoom: 20,
      },
    );
    const darkTiles = L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      {
        attribution: "&copy; OpenStreetMap contributors",
        subdomains: "abcd",
        maxZoom: 20,
      },
    );

    function updateMapTheme() {
      if (document.documentElement.classList.contains("dark")) {
        map.removeLayer(lightTiles);
        darkTiles.addTo(map);
      } else {
        map.removeLayer(darkTiles);
        lightTiles.addTo(map);
      }
    }
    updateMapTheme();
    new MutationObserver(() => updateMapTheme()).observe(
      document.documentElement,
      { attributes: true, attributeFilter: ["class"] },
    );

    // Fetch Data
    fetch('{% url "kultur:events_geojson" %}')
      .then((r) => r.json())
      .then((data) => {
        const geojsonData = typeof data === "string" ? JSON.parse(data) : data;
        allFeatures = geojsonData.features || [];

        extractCategories();
        renderMapAndList();

        if (allFeatures.length > 0) {
          // fit bounds initially
          const lats = allFeatures.map((f) => f.geometry.coordinates[1]);
          const lngs = allFeatures.map((f) => f.geometry.coordinates[0]);
          map.fitBounds(
            [
              [Math.min(...lats), Math.min(...lngs)],
              [Math.max(...lats), Math.max(...lngs)],
            ],
            { padding: [50, 50] },
          );
        }
      });

    // Weather and Location Context — fetched server-side, cached per ~11km cell
    let weatherTimeout;
    function updateWeatherContext() {
        const center = map.getCenter();

        // Display fallback location from nearest event (instant, before fetch returns)
        let nearestMuni = "";
        let minDistance = Infinity;
        allFeatures.forEach(f => {
            const lat = f.geometry.coordinates[1];
            const lng = f.geometry.coordinates[0];
            const dist = Math.sqrt(Math.pow(lat - center.lat, 2) + Math.pow(lng - center.lng, 2));
            if (dist < minDistance) {
                minDistance = dist;
                nearestMuni = f.properties[municipalityField] || f.properties.municipality_es;
            }
        });

        const url = `{% url "kultur:weather" %}?lat=${center.lat.toFixed(2)}&lng=${center.lng.toFixed(2)}`;
        fetch(url)
            .then(r => r.json())
            .then(data => {
                weatherData = data;
                weatherByDate = {};
                (data.days || []).forEach(d => { weatherByDate[d.date] = d; });

                const locationName = data.location || nearestMuni || "—";
                const now = data.now;
                const temp = now ? `${now.temp}°` : "--°";
                const icon = now ? now.icon : "⛅";

                document.querySelectorAll('[id="weather-temp"]').forEach(el => el.innerText = temp);
                document.querySelectorAll('[id="weather-icon"]').forEach(el => el.innerText = icon);
                document.querySelectorAll('[id="weather-location"]').forEach(el => el.innerText = locationName);
                const sheetLoc = document.getElementById('weather-sheet-location');
                if (sheetLoc) sheetLoc.innerText = locationName;

                // Highlight Indoor mood when current is rainy
                const rainBtn = document.querySelector('[data-mood="rain"]');
                if (rainBtn) {
                    const isRainy = now && RAINY_CONDITIONS.has(now.condition);
                    if (isRainy && !activeMoods.has('rain')) {
                        rainBtn.classList.add('animate-pulse', 'ring-2', 'ring-indigo-400', 'border-indigo-400');
                    } else {
                        rainBtn.classList.remove('animate-pulse', 'ring-2', 'ring-indigo-400', 'border-indigo-400');
                    }
                }

                // Refresh sheet content if open, and refresh card chips
                if (document.getElementById('weather-sheet') && !document.getElementById('weather-sheet').classList.contains('hidden')) {
                    renderWeatherSheet();
                }
                renderMapAndList();
            })
            .catch(err => console.error("Weather fetch failed", err));
    }

    function nextWeekendDates(today) {
        // Returns local-date ISO strings [sat, sun] for the upcoming weekend.
        // Why local: backend keys days by server-local date and event dates are local;
        // toISOString() would shift across midnight in non-UTC zones.
        const day = today.getDay(); // 0=Sun..6=Sat
        let satOffset;
        if (day === 6) satOffset = 0;
        else if (day === 0) satOffset = -1;
        else satOffset = 6 - day;
        const sat = new Date(today);
        sat.setDate(today.getDate() + satOffset);
        const sun = new Date(sat);
        sun.setDate(sat.getDate() + 1);
        const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        return [fmt(sat), fmt(sun)];
    }

    function eventsCountForDate(dateIso, isRainy) {
        // Counts events on a given date that match the weather-aware mood.
        const target = new Date(dateIso + 'T00:00:00');
        const dayStart = new Date(target.getFullYear(), target.getMonth(), target.getDate());
        const dayEnd = new Date(dayStart);
        dayEnd.setDate(dayStart.getDate() + 1);

        let total = 0;
        let weatherFit = 0;
        allFeatures.forEach(f => {
            if (!f.properties.start_date) return;
            const ed = new Date(f.properties.start_date);
            if (ed < dayStart || ed >= dayEnd) return;
            total += 1;
            const cat = f.properties.event_type_es || "";
            const venue = (f.properties.venue_name_es || "").toLowerCase();
            const isIndoor =
                indoorCategories.some(ic => cat.includes(ic)) ||
                venue.includes("sala") || venue.includes("teatro") || venue.includes("museo");
            if (isRainy ? isIndoor : !isIndoor) weatherFit += 1;
        });
        return { total, weatherFit };
    }

    window.toggleWeatherSheet = function() {
        const sheet = document.getElementById('weather-sheet');
        const backdrop = document.getElementById('weather-sheet-backdrop');
        if (!sheet || !backdrop) return;
        const isOpen = !sheet.classList.contains('hidden');
        if (isOpen) {
            sheet.classList.add('hidden');
            backdrop.classList.add('hidden');
        } else {
            renderWeatherSheet();
            sheet.classList.remove('hidden');
            backdrop.classList.remove('hidden');
        }
    };

    function renderWeatherSheet() {
        const weekendEl = document.getElementById('weather-weekend');
        const daysEl = document.getElementById('weather-days');
        if (!weekendEl || !daysEl) return;

        if (!weatherData || !weatherData.days || weatherData.days.length === 0) {
            weekendEl.innerHTML = `<p class="text-xs text-slate-400 italic">${t.noForecast}</p>`;
            daysEl.innerHTML = `<p class="text-xs text-slate-400 italic">${t.noForecast}</p>`;
            return;
        }

        // --- Weekend brief ---
        const today = new Date();
        const [satIso, sunIso] = nextWeekendDates(today);
        const sat = weatherByDate[satIso];
        const sun = weatherByDate[sunIso];

        const renderWeekendRow = (label, day, dateIso) => {
            if (!day) return "";
            const isRainy = RAINY_CONDITIONS.has(day.condition);
            const counts = eventsCountForDate(dateIso, isRainy);
            const moodLabel = isRainy ? t.eventsIndoor : t.eventsOutdoor;
            const moodKey = isRainy ? 'rain' : 'outdoor';
            return `
                <button onclick="applyWeatherFilter('weekend','${moodKey}')" class="w-full flex items-center justify-between p-3 rounded-2xl bg-slate-50 dark:bg-slate-800 hover:bg-primary/10 dark:hover:bg-primary/20 border border-slate-200 dark:border-slate-700 transition-all text-left">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${day.icon}</span>
                        <div>
                            <p class="text-sm font-bold text-slate-900 dark:text-slate-100">${label}</p>
                            <p class="text-[11px] text-slate-500">${day.temp_max}° / ${day.temp_min}°${day.rain_mm > 0 ? ` · 💧${day.rain_mm}mm` : ''}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black text-primary">${counts.weatherFit}</p>
                        <p class="text-[10px] text-slate-500 leading-tight">${moodLabel}</p>
                    </div>
                </button>
            `;
        };

        const weekendHtml = [
            renderWeekendRow(t.saturday, sat, satIso),
            renderWeekendRow(t.sunday, sun, sunIso),
        ].filter(Boolean).join("");
        weekendEl.innerHTML = weekendHtml || `<p class="text-xs text-slate-400 italic">${t.noWeekendData}</p>`;

        // --- 5-day strip ---
        daysEl.innerHTML = weatherData.days.map(d => {
            const dateObj = new Date(d.date + 'T00:00:00');
            const dayLabel = dateObj.toLocaleDateString(weatherLocaleTag, { weekday: 'short', day: 'numeric', month: 'short' });
            const isRainy = RAINY_CONDITIONS.has(d.condition);
            const counts = eventsCountForDate(d.date, isRainy);
            return `
                <button onclick="applyDayFilter('${d.date}')" class="w-full flex items-center justify-between px-3 py-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-left">
                    <div class="flex items-center gap-2.5 min-w-0">
                        <span class="text-lg">${d.icon}</span>
                        <span class="text-xs font-semibold text-slate-700 dark:text-slate-300 capitalize truncate">${dayLabel}</span>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                        <span class="text-[10px] text-slate-500">${d.temp_max}°/${d.temp_min}°</span>
                        <span class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full">${counts.total} ${t.eventsAll}</span>
                    </div>
                </button>
            `;
        }).join("");
    }

    window.applyWeatherFilter = function(dateMode, moodKey) {
        // Apply date + mood filters from weather sheet
        if (dateMode === 'weekend') setDate('weekend');
        if (moodKey === 'rain' && !activeMoods.has('rain')) toggleMood('rain');
        if (moodKey === 'outdoor' && activeMoods.has('rain')) toggleMood('rain');
        toggleWeatherSheet();
    };

    window.applyDayFilter = function(dateIso) {
        const target = new Date(dateIso + 'T00:00:00');
        const next = new Date(target);
        next.setDate(target.getDate() + 1);
        currentDate = { start: target, end: next };
        document.querySelectorAll("#date-filters .filter-btn").forEach(btn => {
            btn.classList.remove('active'); btn.classList.add('inactive');
        });
        const customBtn = document.getElementById('custom-date-btn');
        if (customBtn) customBtn.classList.add('bg-primary/20');
        renderMapAndList();
        toggleWeatherSheet();
    };

    let updateListTimeout;
    map.on("moveend", () => {
        clearTimeout(updateListTimeout);
        updateListTimeout = setTimeout(updateList, 200); // Debounce list rebuild during pan/zoom
        clearTimeout(weatherTimeout);
        weatherTimeout = setTimeout(updateWeatherContext, 1000); // Debounce weather API
    });

    // Initial weather load after data is fetched
    // (Wait for features to be ready)
    const checkReady = setInterval(() => {
        if (allFeatures.length > 0) {
            updateWeatherContext();
            clearInterval(checkReady);
        }
    }, 500);

    window.toggleFilters = function() {
        const strip = document.getElementById('filter-strip');
        const btn = document.getElementById('filters-toggle-btn');
        if (strip.classList.contains('max-h-0')) {
            strip.classList.remove('max-h-0', 'p-0', 'border-0');
            strip.classList.add('max-h-[500px]');
            btn.classList.add('text-primary', 'bg-primary/5');
        } else {
            strip.classList.add('max-h-0', 'p-0', 'border-0');
            strip.classList.remove('max-h-[500px]');
            btn.classList.remove('text-primary', 'bg-primary/5');
        }
    };

    window.syncSearch = function(val) {
        document.getElementById('event-search').value = val;
        currentSearch = val.toLowerCase();
        renderMapAndList();
    };

    window.toggleMobileFilters = function() {
        const sidebar = document.getElementById('sidebar');
        const mapContainer = document.getElementById('map-container');
        const btnText = document.getElementById('mobile-toggle-text');
        const strip = document.getElementById('filter-strip');
        
        isListView = true;
        
        // Show sidebar full screen
        sidebar.classList.remove('hidden');
        sidebar.classList.add('flex', 'absolute', 'inset-0', 'z-[2000]', 'w-full');
        mapContainer.classList.add('hidden');
        if (btnText) btnText.innerText = t.seeMap;
        
        // Ensure filters are expanded
        if (strip.classList.contains('max-h-0')) {
            window.toggleFilters();
        }
        
        // Scroll to filters
        setTimeout(() => {
            strip.scrollIntoView({ behavior: 'smooth' });
        }, 100);
    };

    window.setViewMode = function(mode) {
        const sidebar = document.getElementById('sidebar');
        const mapContainer = document.getElementById('map-container');
        const viewMapBtn = document.getElementById('view-map');
        const viewListBtn = document.getElementById('view-list');
        const eventsList = document.getElementById('events-list');

        if (mode === 'list') {
            // Focus on list
            sidebar.classList.remove('md:w-3/5', 'lg:w-[60%]', 'xl:w-[65%]');
            sidebar.classList.add('md:w-full');
            mapContainer.classList.add('hidden');
            
            // Toggle buttons
            viewListBtn.classList.add('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-primary');
            viewListBtn.classList.remove('text-slate-500');
            viewMapBtn.classList.remove('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-primary');
            viewMapBtn.classList.add('text-slate-500');
            
            // Adjust grid
            eventsList.classList.remove('lg:grid-cols-2');
            eventsList.classList.add('md:grid-cols-2', 'lg:grid-cols-3', 'xl:grid-cols-4', '2xl:grid-cols-5');
        } else {
            // Focus on map
            sidebar.classList.add('md:w-3/5', 'lg:w-[60%]', 'xl:w-[65%]');
            sidebar.classList.remove('md:w-full');
            mapContainer.classList.remove('hidden');
            
            // Toggle buttons
            viewMapBtn.classList.add('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-primary');
            viewMapBtn.classList.remove('text-slate-500');
            viewListBtn.classList.remove('bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-primary');
            viewListBtn.classList.add('text-slate-500');

            // Adjust grid
            eventsList.classList.add('md:grid-cols-2', 'lg:grid-cols-3');
            eventsList.classList.remove('xl:grid-cols-4', '2xl:grid-cols-5');
            
            setTimeout(() => map.invalidateSize(), 100);
        }
    };
    document
      .getElementById("mobile-toggle-btn")
      .addEventListener("click", () => {
        isListView = !isListView;
        const sidebar = document.getElementById("sidebar");
        const mapContainer = document.getElementById("map-container");
        const btnText = document.getElementById("mobile-toggle-text");

        if (isListView) {
          // Show sidebar full screen, hide map
          sidebar.classList.remove("hidden");
          sidebar.classList.add(
            "flex",
            "absolute",
            "inset-0",
            "z-[2000]",
            "w-full",
          );
          mapContainer.classList.add("hidden");
          btnText.innerText = t.seeMap;
        } else {
          // Hide sidebar, show map
          sidebar.classList.add("hidden");
          sidebar.classList.remove(
            "flex",
            "absolute",
            "inset-0",
            "z-[2000]",
            "w-full",
          );
          mapContainer.classList.remove("hidden");
          btnText.innerText = t.seeList;

          // Fix leaflet map size after unhiding
          setTimeout(() => map.invalidateSize(), 100);
        }
      });
  });

  const iconMap = {
    Concierto:
      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
    Teatro:
      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11h.01"/><path d="M14 6h.01"/><path d="M18 6h.01"/><path d="M6.5 13.1h.01"/><path d="M22 5c0 9-4 12-6 12s-6-3-6-12c0-2 2-3 6-3s6 1 6 3"/><path d="M17.4 9.9c-.8.8-2 .8-2.8 0"/><path d="M10.1 7.1C9 7.2 7.7 7.7 6 8.6c-3.5 2-4.7 3.9-3.7 5.6 4.5 7.8 9.5 8.4 11.2 7.4.9-.5 1.9-2.1 1.9-4.7"/><path d="M9.1 16.5c.3-1.1 1.4-1.7 2.4-1.4"/></svg>',
    Antzerkia:
      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11h.01"/><path d="M14 6h.01"/><path d="M18 6h.01"/><path d="M6.5 13.1h.01"/><path d="M22 5c0 9-4 12-6 12s-6-3-6-12c0-2 2-3 6-3s6 1 6 3"/><path d="M17.4 9.9c-.8.8-2 .8-2.8 0"/><path d="M10.1 7.1C9 7.2 7.7 7.7 6 8.6c-3.5 2-4.7 3.9-3.7 5.6 4.5 7.8 9.5 8.4 11.2 7.4.9-.5 1.9-2.1 1.9-4.7"/><path d="M9.1 16.5c.3-1.1 1.4-1.7 2.4-1.4"/></svg>',
    Exposición:
      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>',
    Erakusketa:
      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>',
    Cine: 
      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M17 3v18"/><path d="M3 7h4"/><path d="M3 12h18"/><path d="M3 17h4"/><path d="M17 12h4"/><path d="M17 17h4"/><path d="M17 7h4"/></svg>',
    "Cine y audiovisuales":
      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M17 3v18"/><path d="M3 7h4"/><path d="M3 12h18"/><path d="M3 17h4"/><path d="M17 12h4"/><path d="M17 17h4"/><path d="M17 7h4"/></svg>',

      '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>',
    Danza:

  function extractCategories() {
    const cats = new Set();
    allFeatures.forEach((f) => {
      const c = f.properties.event_type_es;
      if (c && c.trim() !== "") cats.add(c.trim());
    });

    const container = document.getElementById("category-filters");
    if (!container) return;
    
    // Clear existing dynamic buttons
    container.querySelectorAll('button:not([data-filter="all"])').forEach(b => b.remove());

    Array.from(cats)
      .sort()
      .forEach((cat) => {
        const btn = document.createElement("button");
        btn.className = "filter-btn inactive px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400";

        const sample = allFeatures.find(
          (f) => f.properties.event_type_es === cat,
        );
        const label = sample ? sample.properties[typeField] : cat;
        const icon = iconMap[cat] || iconMap.default;

        btn.innerHTML = `<span class="opacity-70">${icon}</span> <span>${label}</span>`;
        btn.onclick = () => setCategory(cat);
        btn.dataset.filter = cat;
        container.appendChild(btn);
      });
  }

  window.setCategory = function (cat) {
    currentCategory = cat;
    document
      .querySelectorAll("#category-filters .filter-btn")
      .forEach((btn) => {
        const btnCat = btn.dataset.filter;

        if (btnCat === cat) {
          btn.className = `filter-btn active px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 text-white shadow-lg bg-primary border-primary scale-105`;
        } else {
          btn.className = `filter-btn inactive px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400`;
        }

    renderMapAndList();

    // Initialize Flatpickr
    flatpickr("#date-range-picker", {

            if (selectedDates.length === 2) {
                currentDate = { start: selectedDates[0], end: selectedDates[1] };
                
                // Update UI for all buttons
                document.querySelectorAll("#date-filters .filter-btn").forEach(btn => {
                    btn.classList.remove('active');
                    btn.classList.add('inactive');

                // Highlight the custom button
                document.getElementById('custom-date-btn').classList.add('bg-primary/20');

  function matchesFilters(feature) {
    const props = feature.properties;

    // Search Filter (Hybrid: Title or Municipality)
    if (currentSearch) {
      const title = (props.title_es || "").toLowerCase();
      const titleEu = (props.title_eu || "").toLowerCase();
      const muni = (props.municipality_es || "").toLowerCase();
      const muniEu = (props.municipality_eu || "").toLowerCase();
      if (
        !title.includes(currentSearch) &&
        !titleEu.includes(currentSearch) &&
        !muni.includes(currentSearch) &&
        !muniEu.includes(currentSearch)
      ) {
        return false;
      }
    }

    // Category Filter
    if (currentCategory !== "all" && props.event_type_es !== currentCategory)
      return false;

    // Date Filter
    if (currentDate !== "all" && props.start_date) {
      const eventDate = new Date(props.start_date);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

      if (currentDate === "today") {
        const eventDay = new Date(
          eventDate.getFullYear(),
          eventDate.getMonth(),
          eventDate.getDate(),
        );
        if (eventDay.getTime() !== today.getTime()) return false;
      } else if (currentDate === "weekend") {
        const dayOfWeek = today.getDay();
        let daysToFriday;
        if (dayOfWeek === 6) daysToFriday = -1;
        else if (dayOfWeek === 0) daysToFriday = -2;
        else daysToFriday = 5 - dayOfWeek;

        const thisFriday = new Date(today);
        thisFriday.setDate(today.getDate() + daysToFriday);
        const thisSunday = new Date(thisFriday);
        thisSunday.setDate(thisFriday.getDate() + 2);
        thisSunday.setHours(23, 59, 59);

        if (eventDate < thisFriday || eventDate > thisSunday) {
          return false;
        }
      } else if (currentDate.start && currentDate.end) {
        if (eventDate < currentDate.start || eventDate > currentDate.end)
          return false;
      }
    }

    // Mood Filters (AND logic)
    if (activeMoods.has("hot")) {
      const isHot =
        props.image_url &&
        ((props.title_es || "").length > 20 ||
          props.event_type_es === "Festival");
      if (!isHot) return false;
    }

    if (activeMoods.has("free")) {
      const p = (props.price_es || "").toLowerCase();
      const isFree =
        p.includes("gratis") ||
        p.includes("0€") ||
        p.includes("dohainik") ||
        p === "" ||
        p === "0";
      if (!isFree) return false;
    }

    if (activeMoods.has('family')) {
        if (!props.is_family) return false;
    }

    if (activeMoods.has('night')) {
        const cat = (props.event_type_es || '').toLowerCase();
        const hours = (props.opening_hours_es || '').toLowerCase();
        const isNight = cat.includes('concierto') || cat.includes('danza') || cat.includes('teatro') || hours.includes('19:') || hours.includes('20:') || hours.includes('21:') || hours.includes('22:');
        if (!isNight) return false;
    }

    if (activeMoods.has("rain")) {
      const cat = props.event_type_es || "";
      const venue = (props.venue_name_es || "").toLowerCase();
      const isIndoor =
        indoorCategories.some((ic) => cat.includes(ic)) ||
        venue.includes("sala") ||
        venue.includes("teatro") ||
        venue.includes("museo");
      if (!isIndoor) return false;
    }

    if (activeMoods.has("euskara")) {
      const hasEu =
        props.title_eu &&
        props.title_eu.trim() !== "" &&
        props.title_eu !== props.title_es;
      const hasEuDesc =
        props.description_eu && props.description_eu.length > 50;
      if (!hasEu && !hasEuDesc) return false;
    }

    return true;
  }

  // Tracks the events at each marker so the sheet handler can fetch them on click.
  // Key strategy: prefer venue_id (stable backend FK), fall back to lng,lat at 5-decimal precision
  // for legacy events without a Venue link.
  let venueGroups = new Map();

  function venueKeyFor(feature) {
    const vid = feature.properties.venue_id;
    if (vid != null) return `v:${vid}`;
    const c = feature.geometry.coordinates;
    return `c:${c[0].toFixed(5)},${c[1].toFixed(5)}`;
  }

  function dominantCategory(events) {
    // Pick the category with the most events at this venue. Ties broken by
    // first occurrence — predictable enough for a visual hint.
    const counts = {};
    let bestCat = "default";
    let bestN = 0;
    for (const ev of events) {
      const c = ev.properties.event_type_es || "default";
      counts[c] = (counts[c] || 0) + 1;
      if (counts[c] > bestN) { bestN = counts[c]; bestCat = c; }
    }
    return bestCat;
  }

  function renderMapAndList() {
    try {
      const filteredFeatures = allFeatures.filter(matchesFilters);

      if (geoJsonLayer) map.removeLayer(geoJsonLayer);

      geoJsonLayer = L.markerClusterGroup({
        chunkedLoading: true,
        chunkInterval: 100,
        spiderfyOnMaxZoom: false,
        showCoverageOnHover: false,
        maxClusterRadius: 50,
      });

      // Group features by venue so each venue becomes a single marker
      // with a badge showing how many events it hosts.
      venueGroups = new Map();
      for (const feature of filteredFeatures) {
        const key = venueKeyFor(feature);
        let grp = venueGroups.get(key);
        if (!grp) {
          grp = { key, coords: feature.geometry.coordinates, events: [] };
          venueGroups.set(key, grp);
        }
        grp.events.push(feature);
      }

      const markers = [];
      const isMobile = window.innerWidth < 768;

      for (const grp of venueGroups.values()) {
        const cat = dominantCategory(grp.events);
        const colors = categoryColors[cat] || categoryColors.default;
        const svgIcon = iconMap[cat] || iconMap.default;
        const n = grp.events.length;
        const badge = n > 1
          ? `<span class="absolute -top-1.5 -right-1.5 min-w-[20px] h-5 px-1 bg-white dark:bg-slate-900 text-slate-900 dark:text-white text-[10px] font-black rounded-full border-2 border-current ring-1 ring-black/5 flex items-center justify-center leading-none ${colors.text}">${n > 99 ? '99+' : n}</span>`
          : '';
        const icon = L.divIcon({
          className: "custom-map-marker",
          html: `<div class="relative"><div class="${colors.bg} text-white p-1.5 rounded-full shadow-lg border-2 border-white dark:border-slate-800 transition-transform hover:scale-110 flex items-center justify-center w-9 h-9">${svgIcon}</div>${badge}</div>`,
          iconSize: [36, 36],
          iconAnchor: [18, 18],
          popupAnchor: [0, -18],
        });

        const marker = L.marker([grp.coords[1], grp.coords[0]], { icon });

        if (n === 1) {
          // Single event: keep popup + scroll-to-card behavior.
          const feature = grp.events[0];
          const props = feature.properties;
          const title = props[titleField] || props.title_es || props.title_eu || "";
          const typeLabel = props[typeField] || props.event_type_es || props.event_type_eu || "Evento";
          const venue = props[venueField] || props.venue_name_es || "";
          const price = props[priceField] || "";
          const fid = feature.id;

          marker.bindPopup(
            `<div class="p-3 cursor-pointer min-w-[200px]" onclick="document.getElementById('event-card-${fid}')?.scrollIntoView({behavior:'smooth', block:'center'});">
              <span class="text-[9px] font-bold ${colors.text} mb-1 inline-block uppercase tracking-wide px-2 py-0.5 rounded-full ${colors.bgSoft}">${typeLabel}</span>
              <h3 class="font-bold text-slate-900 dark:text-slate-100 text-sm leading-tight mb-1" title="${title}">${title}</h3>
              <p class="text-[10px] text-slate-500 flex items-center gap-1">
                <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                ${venue}
              </p>
              ${price ? `<p class="text-[10px] text-emerald-600 font-bold mt-1">${price}</p>` : ""}
            </div>`,
            { className: "minimal-popup", closeButton: false, autoPanPadding: [50, 50] }
          );

          marker.on("click", () => {
            const card = document.getElementById(`event-card-${fid}`);
            if (!card) return;
            if (isMobile) {
              const btn = document.getElementById("mobile-toggle-btn");
              const btnText = document.getElementById("mobile-toggle-text");
              if (btnText && btnText.innerText === t.seeList) btn.click();
              setTimeout(() => scrollAndHighlightCard(card), 100);
            } else {
              scrollAndHighlightCard(card);
            }
          });
        } else {
          // Multiple events: open the venue sheet.
          const groupKey = grp.key;
          marker.on("click", () => openVenueSheet(groupKey));
        }

        markers.push(marker);
      }

      geoJsonLayer.addLayers(markers);
      map.addLayer(geoJsonLayer);

      updateList();
    } catch (e) {
      console.error("Error in renderMapAndList:", e);
    }
  }

  function scrollAndHighlightCard(card) {
    card.scrollIntoView({ behavior: "smooth", block: "center" });
    card.classList.add("ring-2", "ring-primary", "shadow-xl", "scale-[1.02]");
    setTimeout(() => {
      card.classList.remove(
        "ring-2",
        "ring-primary",
        "shadow-xl",
        "scale-[1.02]",
      );
    }, 1500);
  }

  const CARD_PAGE_SIZE = 30;
  let listVisibleFeatures = [];
  let listRenderedCount = 0;
  let listObserver = null;

  function buildCardElement(f) {
    const props = f.properties;
    const cat = props.event_type_es;
    const colors = categoryColors[cat] || categoryColors.default;
    const title = props[titleField] || props.title_es || props.title_eu || "";
    const typeLabel =
      props[typeField] ||
      props.event_type_es ||
      props.event_type_eu ||
      t.cultural;
    const venue = props[venueField] || props.venue_name_es || "";
    const muni = props[municipalityField] || props.municipality_es || "";
    const price = props[priceField] || "";
    const hours = props[hoursField] || "";

    let dateStr = t.unknownDate;
    let weatherChip = "";
    if (props.start_date) {
      dateStr = new Date(props.start_date).toLocaleDateString(
        currentLang === "eu" ? "eu-ES" : "es-ES",
        { weekday: "short", month: "short", day: "numeric" },
      );
      if (hours) dateStr += ` • ${hours}`;
      const dateIso = props.start_date.slice(0, 10);
      const day = weatherByDate[dateIso];
      if (day) {
        weatherChip = `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md bg-sky-50 dark:bg-sky-900/30 text-sky-700 dark:text-sky-300 text-[10px] font-bold leading-none" title="${day.condition}">${day.icon} ${day.temp_max}°</span>`;
      }
    }

    const el = document.createElement('div');
    el.id = `event-card-${f.id}`;
    el.className = `group flex flex-col bg-white dark:bg-slate-800 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 cursor-pointer overflow-hidden border border-slate-200 dark:border-slate-700 h-full`;
    el.innerHTML = `
        <div class="relative h-40 w-full overflow-hidden">
            ${props.image_url ? `
                <img src="${props.image_url}" loading="lazy" decoding="async" onerror="this.parentElement.innerHTML='<div class=&quot;w-full h-full ${colors.bg} opacity-20&quot;></div>'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="Evento">
            ` : `
                <div class="w-full h-full ${colors.bg} flex items-center justify-center opacity-20">
                     ${iconMap[cat] || iconMap.default}
                </div>
            `}
            <div class="absolute top-2 right-2">
                <span class="text-[10px] font-bold ${colors.text} uppercase tracking-wider px-2 py-1 rounded-lg bg-white/90 dark:bg-slate-900/90 shadow-sm backdrop-blur-sm">
                    ${typeLabel}
                </span>
            </div>
            ${activeMoods.has('hot') ? `
                <div class="absolute top-2 left-2 animate-bounce">
                     <span class="bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded-lg">✨</span>
                </div>
            ` : ''}
        </div>
        <div class="p-3 flex flex-col flex-1">
            <h4 class="font-bold text-slate-900 dark:text-slate-100 leading-tight mb-1 line-clamp-2" title="${title}">${title}</h4>
            <div class="mt-auto space-y-1.5">
                <p class="text-[11px] text-slate-500 dark:text-slate-400 flex items-center gap-1.5 flex-wrap">
                    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    <span>${dateStr}</span>
                    ${weatherChip}
                </p>
                <p class="text-[11px] font-medium text-slate-700 dark:text-slate-300 truncate flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    ${muni || venue}
                </p>
                ${price ? `
                <p class="text-[11px] font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    ${price}
                </p>` : ''}
            </div>
        </div>
    `;

    el.onclick = () => {
      const target = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
      geoJsonLayer.eachLayer((layer) => {
        if (
          layer.getLatLng().lat === target[0] &&
          layer.getLatLng().lng === target[1]
        ) {
          geoJsonLayer.zoomToShowLayer(layer, () => layer.openPopup());
        }
      });
    };
    return el;
  }

  function appendNextPage(container) {
    const end = Math.min(listRenderedCount + CARD_PAGE_SIZE, listVisibleFeatures.length);
    const fragment = document.createDocumentFragment();
    for (let i = listRenderedCount; i < end; i++) {
      fragment.appendChild(buildCardElement(listVisibleFeatures[i]));
    }
    container.appendChild(fragment);
    listRenderedCount = end;
  }

  function attachInfiniteScroll(container) {
    if (listObserver) {
      listObserver.disconnect();
      listObserver = null;
    }
    if (listRenderedCount >= listVisibleFeatures.length) return;

    const sentinel = document.createElement('div');
    sentinel.className = 'col-span-full h-1';
    container.appendChild(sentinel);

    listObserver = new IntersectionObserver((entries) => {
      if (!entries[0].isIntersecting) return;
      sentinel.remove();
      appendNextPage(container);
      attachInfiniteScroll(container);
    }, { rootMargin: '400px' });
    listObserver.observe(sentinel);
  }

  function updateList() {
    const bounds = map.getBounds();
    const container = document.getElementById("events-list");
    if (!container) return;

    if (listObserver) {
      listObserver.disconnect();
      listObserver = null;
    }
    container.innerHTML = "";
    listRenderedCount = 0;

    listVisibleFeatures = allFeatures.filter((f) => {
      const latLng = L.latLng(
        f.geometry.coordinates[1],
        f.geometry.coordinates[0],
      );
      return matchesFilters(f) && bounds.contains(latLng);
    });

    const mobileCount = document.getElementById("mobile-count");
    if (mobileCount) mobileCount.innerText = listVisibleFeatures.length;

    if (listVisibleFeatures.length === 0) {
      container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-40 text-center col-span-full">
                    <span class="text-4xl mb-2">🗺️</span>
                    <p class="text-slate-500 dark:text-slate-400">${t.noEvents}</p>
                    <p class="text-sm text-slate-400 mt-2">${t.tryZoom}</p>
                </div>
            `;
      return;
    }

    appendNextPage(container);
    attachInfiniteScroll(container);
  }

  window.openVenueSheet = function (groupKey) {
    const grp = venueGroups.get(groupKey);
    if (!grp) return;

    const sheet = document.getElementById('venue-sheet');
    const backdrop = document.getElementById('venue-sheet-backdrop');
    const body = document.getElementById('venue-sheet-body');
    const titleEl = document.getElementById('venue-sheet-title');
    const countEl = document.getElementById('venue-sheet-count');

    const first = grp.events[0].properties;
    const venueName = first[venueField] || first.venue_name_es || first.venue_name_eu || "—";
    const muni = first[municipalityField] || first.municipality_es || "";
    titleEl.innerText = venueName;
    countEl.innerText = `${grp.events.length} ${t.eventsAll}${muni ? ' · ' + muni : ''}`;

    // Sort by start_date ascending so upcoming dates lead.
    const sorted = grp.events.slice().sort((a, b) => {
      const da = a.properties.start_date || '';
      const db = b.properties.start_date || '';
      return da.localeCompare(db);
    });

    body.innerHTML = sorted.map(ev => {
      const props = ev.properties;
      const cat = props.event_type_es || "default";
      const colors = categoryColors[cat] || categoryColors.default;
      const title = props[titleField] || props.title_es || props.title_eu || "";
      const typeLabel = props[typeField] || props.event_type_es || props.event_type_eu || t.cultural;
      const price = props[priceField] || "";
      let dateStr = t.unknownDate;
      if (props.start_date) {
        dateStr = new Date(props.start_date).toLocaleDateString(
          currentLang === "eu" ? "eu-ES" : "es-ES",
          { weekday: "short", month: "short", day: "numeric" },
        );
      }
      const thumb = props.image_url
        ? `<img src="${props.image_url}" loading="lazy" class="w-14 h-14 rounded-xl object-cover flex-shrink-0" alt="">`
        : `<div class="w-14 h-14 rounded-xl ${colors.bg} opacity-20 flex-shrink-0"></div>`;
      return `
        <button type="button" onclick="goToEventCard(${ev.id})" class="w-full flex items-center gap-3 p-2 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-left">
          ${thumb}
          <div class="min-w-0 flex-1">
            <span class="text-[9px] font-bold ${colors.text} uppercase tracking-wide ${colors.bgSoft} px-1.5 py-0.5 rounded inline-block mb-0.5">${typeLabel}</span>
            <p class="font-bold text-sm text-slate-900 dark:text-slate-100 leading-tight line-clamp-2">${title}</p>
            <p class="text-[11px] text-slate-500 mt-0.5">${dateStr}${price ? ' · <span class="text-emerald-600 font-bold">' + price + '</span>' : ''}</p>
          </div>
          <svg class="w-4 h-4 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
        </button>
      `;
    }).join('');

    sheet.classList.remove('hidden');
    backdrop.classList.remove('hidden');
  };

  window.closeVenueSheet = function () {
    document.getElementById('venue-sheet')?.classList.add('hidden');
    document.getElementById('venue-sheet-backdrop')?.classList.add('hidden');
  };

  window.goToEventCard = function (eventId) {
    closeVenueSheet();
    const card = document.getElementById(`event-card-${eventId}`);
    if (!card) return;
    const isMobile = window.innerWidth < 768;
    if (isMobile) {
      const btn = document.getElementById("mobile-toggle-btn");
      const btnText = document.getElementById("mobile-toggle-text");
      if (btnText && btnText.innerText === t.seeList) btn.click();
      setTimeout(() => scrollAndHighlightCard(card), 100);
    } else {
      scrollAndHighlightCard(card);
    }
  };

  window.surpriseMe = function () {
    const visibleFeatures = allFeatures.filter(matchesFilters);
    if (visibleFeatures.length === 0) return;

    const randomFeature =
      visibleFeatures[Math.floor(Math.random() * visibleFeatures.length)];
    const target = [
      randomFeature.geometry.coordinates[1],
      randomFeature.geometry.coordinates[0],
    ];

    geoJsonLayer.eachLayer((layer) => {
      if (
        layer.getLatLng().lat === target[0] &&
        layer.getLatLng().lng === target[1]
      ) {
        geoJsonLayer.zoomToShowLayer(layer, () => layer.openPopup());
      }
    });

    setTimeout(() => {
      const card = document.getElementById(`event-card-${randomFeature.id}`);
      if (card) scrollAndHighlightCard(card);
    }, 1500);
  };
</script>
