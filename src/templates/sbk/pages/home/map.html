{% load i18n %}
<c-layouts.main title="{{ page_title|default:'SBK Hub - Internacional' }}">
    <c-slot name="extra_head">
        <meta name="description" content="{{ meta_description|default:'Encuentra los mejores festivales, socials y talleres SBK en Euskal Herria y alrededores.' }}">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
        <style>
            #map { height: calc(100vh - 64px); width: 100%; z-index: 1; }
            .minimal-popup .leaflet-popup-content-wrapper { border-radius: 0.75rem; padding: 0.25rem; overflow: hidden; }
            .minimal-popup .leaflet-popup-content { margin: 0; width: max-content !important; min-width: 120px; }
            html:not(.dark) .minimal-popup .leaflet-popup-content-wrapper { background-color: #ffffff; color: #1f2937; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
            html:not(.dark) .minimal-popup .leaflet-popup-tip { background-color: #ffffff; }
            html.dark .minimal-popup .leaflet-popup-content-wrapper { background-color: #1e293b; color: #f1f5f9; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.5); }
            html.dark .minimal-popup .leaflet-popup-tip { background-color: #1e293b; }
            .custom-map-marker { background: none !important; border: none !important; }
            .scrollbar-hide::-webkit-scrollbar { display: none; }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
            .filter-btn { white-space: nowrap; padding: 0.375rem 0.875rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; border: 1px solid transparent; }
            .filter-btn.inactive { background-color: #f1f5f9; color: #64748b; }
            html.dark .filter-btn.inactive { background-color: #334155; color: #cbd5e1; }
            .filter-btn.inactive:hover { background-color: #e2e8f0; }
            html.dark .filter-btn.inactive:hover { background-color: #475569; }
            .filter-btn.active { background-color: #e11d48; color: white; box-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.3); }
            .pulse-marker-inner { animation: marker-pulse 2s infinite; border-radius: 50%; width: 100%; height: 100%; }
            @keyframes marker-pulse { 
                0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); } 
                70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); } 
                100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } 
            }
        </style>
    </c-slot>

    <div class="flex flex-col md:flex-row h-[calc(100vh-64px)] overflow-hidden">
        {% include "sbk/partials/map_sidebar.html" %}

        <!-- Map Container -->
        <div class="w-full flex-1 h-full relative" id="map-container">
            <div id="map"></div>

            <!-- Mobile Search & Filter Bar Overlay -->
            <div class="md:hidden absolute top-4 left-4 right-16 z-[1000]">
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="search" class="h-4 w-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="mobile-event-search" oninput="updateSearch(this.value)" placeholder="{% translate 'Busca festivales o estilos...' %}" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200/50 dark:border-slate-700/50 rounded-2xl leading-5 bg-white/90 dark:bg-slate-800/90 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-rose-500 text-xs transition-all shadow-xl backdrop-blur-md">
                    </div>
                    <button onclick="toggleMobileFilters()" class="p-2.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-2xl border border-slate-200/50 dark:border-slate-700/50 shadow-xl text-slate-500 hover:text-rose-500 transition-colors">
                        <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Weather & Theme Toggle Overlay -->
            <div class="absolute top-4 right-4 z-[1000] flex flex-col items-end gap-2">
                <div class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-lg rounded-full shadow-xl">
                    <c-molecules.theme_toggle />
                </div>
                
                <!-- Premium Weather Pill -->
                <div id="weather-widget" class="hidden md:flex items-center gap-2 px-3 py-1.5 bg-white/90 dark:bg-slate-800/90 backdrop-blur-lg rounded-2xl border border-slate-200/50 dark:border-slate-700/50 shadow-xl transition-all duration-500 hover:scale-105">
                    <div class="flex items-center gap-1.5 border-r border-slate-200 dark:border-slate-700 pr-2">
                        <span id="weather-icon" class="text-sm">--</span>
                        <span class="text-xs font-black text-slate-800 dark:text-slate-100" id="weather-temp">--°</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[8px] uppercase tracking-widest font-bold text-slate-400 dark:text-slate-500 leading-none mb-0.5">{% translate "Clima" %}</span>
                        <span class="text-[10px] font-bold text-slate-700 dark:text-slate-300 max-w-[80px] truncate leading-none" id="weather-location">...</span>
                    </div>
                </div>
            </div>

            <!-- Add Social FAB -->
            <button onclick="toggleAddSocialMode(event)" id="btn-add-social" class="absolute bottom-24 md:bottom-8 left-1/2 transform -translate-x-1/2 z-[2000] bg-rose-600 hover:bg-rose-700 text-white px-6 py-3 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.3)] font-bold flex items-center gap-2 transition-all hover:scale-105 active:scale-95 group">
                <svg class="w-5 h-5 group-hover:rotate-90 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                {% translate "Añadir Social" %}
            </button>
            
            <!-- Instructions Toast -->
            <div id="add-social-toast" class="absolute top-20 left-1/2 transform -translate-x-1/2 z-[2000] bg-slate-900/90 backdrop-blur text-white px-6 py-3 rounded-full font-medium shadow-xl opacity-0 pointer-events-none transition-opacity flex items-center gap-3">
                <svg class="w-5 h-5 text-rose-500 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                {% translate "Haz clic en el mapa donde es la fiesta" %}
            </div>
        </div>
        
        <!-- Mobile Toggle List Button -->
        <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[3000]">
            <button id="mobile-toggle-btn" class="bg-rose-600 dark:bg-rose-500 text-white px-6 py-3 rounded-full font-bold shadow-2xl flex items-center gap-2 border border-rose-700 dark:border-rose-400">
                <span id="mobile-toggle-text">{% translate "Ver eventos" %}</span>
                <span id="mobile-count" class="bg-white text-rose-600 font-bold text-xs px-2 py-0.5 rounded-full shadow-inner">0</span>
            </button>
        </div>
    </div>

    {% include "sbk/partials/map_modals.html" %}

    <c-slot name="extra_js">
        {% include "sbk/partials/map_scripts.html" %}
    </c-slot>
</c-layouts.main>
