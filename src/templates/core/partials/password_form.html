{% load i18n %}
<form hx-post="{% url 'update_password' %}" hx-target="#password-form-container" class="space-y-6">
    {% csrf_token %}
    {% for field in password_form %}
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ field.label }}</label>
            <input type="password" name="{{ field.name }}" 
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
            {% if field.errors %}
                <p class="text-[10px] text-red-500 font-bold uppercase tracking-widest mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
    {% endfor %}
    <c-atoms.button variant="primary" type="submit" class="w-full py-4">
        {% trans "Change Password" %}
    </c-atoms.button>
</form>
