{% load i18n %}
<form hx-post="{% url 'update_username' %}" hx-target="#username-form-container" class="space-y-6">
    {% csrf_token %}
    <div class="space-y-2">
        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{% trans "New Username" %}</label>
        {{ username_form.username }}
    </div>
    <c-atoms.button variant="primary" type="submit" class="w-full py-4">
        {% trans "Change Username" %}
    </c-atoms.button>
</form>
