{# Form Field - Cotton Atom #}
<div>
    <label for="{{ field_id }}" class="block text-sm font-medium text-gray-300 dark:text-gray-300 light:text-gray-700 mb-2">{{ label }}</label>
    <input
        type="{{ field_type|default:'text' }}"
        id="{{ field_id }}"
        name="{{ field_name }}"
        class="w-full px-4 py-2 rounded-lg bg-gray-800 dark:bg-gray-800 light:bg-white border border-gray-700 dark:border-gray-700 light:border-gray-300 text-white dark:text-white light:text-gray-900 placeholder-gray-500 dark:placeholder-gray-500 light:placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        {% if required %}required{% endif %}
    >
    {% if errors %}
        <div class="text-red-400 dark:text-red-400 light:text-red-700 text-sm mt-1">
            {% for error in errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>
    {% endif %}
</div>
