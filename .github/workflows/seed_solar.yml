name: Seed Solar

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: 'Bounding Box (lat_min,lon_min,lat_max,lon_max)'
        required: true
        default: '43.316,-1.985,43.322,-1.975'

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: ai-maps
    steps:
      - name: SSH and run seeders
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.APP_DIR }}
            
            echo "Running import_buildings for bbox: ${{ github.event.inputs.bbox }}..."
            docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml run --rm web python manage.py import_buildings --bbox "${{ github.event.inputs.bbox }}"
            
            echo "Solar seeding complete!"
