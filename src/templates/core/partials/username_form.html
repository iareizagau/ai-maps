{% load i18n %}

<div id="username-form-container">
    {% if messages %}
        <div class="space-y-2 mb-6">
            {% for message in messages %}
                <div class="flex items-center gap-3 p-4 {% if message.tags == 'success' %}bg-green-500/10 border border-green-500/20 text-green-500{% else %}bg-red-500/10 border border-red-500/20 text-red-500{% endif %} rounded-2xl text-sm font-bold animate-in fade-in slide-in-from-top-4 duration-300">
                    <i data-lucide="{% if message.tags == 'success' %}check-circle{% else %}alert-circle{% endif %}" class="h-5 w-5"></i>
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form hx-post="{% url 'update_username' %}" hx-target="#username-form-container" hx-swap="outerHTML" class="space-y-6">
        {% csrf_token %}
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{% trans "New Username" %}</label>
            {{ username_form.username }}
            {% if username_form.username.errors %}
                <p class="text-xs text-red-500 mt-1">{{ username_form.username.errors.0 }}</p>
            {% endif %}
        </div>
        <c-atoms.button variant="primary" type="submit" class="w-full py-4">
            {% trans "Change Username" %}
        </c-atoms.button>
    </form>
</div>
