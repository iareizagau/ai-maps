{% load i18n %}
<c-vars dishes=None title="" />

<c-atoms.card variant="glass" class="p-2 sm:p-4">
    <div class="space-y-2" id="leaderboard-list">
        {% for dish in dishes %}
            <c-molecules.ranking_row :dish="dish" :rank="forloop.counter" />
            {% if not forloop.last %}
                <div class="ml-16 h-px bg-gradient-to-r from-slate-200 dark:from-white/5 to-transparent"></div>
            {% endif %}
        {% empty %}
            <p class="text-center py-12 text-slate-400 dark:text-gray-500 italic text-sm">{% trans "The podium is empty. Start rating!" %}</p>
        {% endfor %}
    </div>
</c-atoms.card>
