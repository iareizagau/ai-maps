{% load i18n %}
<!-- Sidebar -->
<div class="hidden md:flex flex-col w-full md:w-3/5 lg:w-[60%] xl:w-[65%] h-full bg-slate-50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 shadow-xl z-10 flex-shrink-0" id="sidebar">
    <div class="p-4 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
        <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">{% trans "Cultura Local" %}</h2>
                <div class="flex items-center gap-2">
                    <div id="view-mode-toggle" class="hidden md:flex p-0.5 bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">
                        <button onclick="setViewMode('map')" id="view-map" class="p-1 rounded-md transition-all bg-white dark:bg-slate-700 shadow-sm text-primary">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                        </button>
                        <button onclick="setViewMode('list')" id="view-list" class="p-1 rounded-md transition-all text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                        </button>
                    </div>
                    <button type="button" onclick="toggleWeatherSheet()" class="weather-widget-trigger flex items-center gap-1.5 px-2.5 py-1 bg-indigo-50 dark:bg-indigo-900/30 rounded-full border border-indigo-100 dark:border-indigo-800/50 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors cursor-pointer">
                        <span class="text-[10px] font-bold text-indigo-700 dark:text-indigo-300" id="weather-temp">--°</span>
                        <span id="weather-icon" class="text-xs">⛅</span>
                    </button>
                </div>
            </div>
            
            <div class="flex gap-2">
                <!-- Hybrid Search Bar -->
                <div class="relative flex-1">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <input type="text" id="event-search" oninput="updateSearch()" placeholder="{% trans 'Busca eventos o ciudades...' %}" class="block w-full pl-9 pr-3 py-1.5 border border-slate-200 dark:border-slate-700 rounded-xl leading-5 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-xs transition-all shadow-sm">
                </div>
                <button onclick="toggleFilters()" id="filters-toggle-btn" class="px-3 py-1.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-500 hover:text-primary transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Improved Filter Strip -->
    <div id="filter-strip" class="bg-white dark:bg-slate-900 transition-all duration-300 overflow-hidden max-h-0 p-0 border-0">
        <div class="p-4 space-y-5">
            <!-- Experiences (Large Icons) -->
            <div>
                <div class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 px-1">{% trans "Experiencias" %}</div>
                <div class="grid grid-cols-3 gap-2" id="mood-filters">
                    <button onclick="toggleMood('hot')" data-mood="hot" class="mood-btn opacity-60 flex flex-col items-center justify-center p-3 rounded-2xl border border-orange-100 dark:border-orange-900/30 bg-orange-50/50 dark:bg-orange-900/10 text-orange-700 dark:text-orange-400 transition-all cursor-pointer">
                        <span class="text-xl mb-1">✨</span>
                        <span class="text-[10px] font-bold">{% trans "Top" %}</span>
                    </button>
                    <button onclick="toggleMood('free')" data-mood="free" class="mood-btn opacity-60 flex flex-col items-center justify-center p-3 rounded-2xl border border-emerald-100 dark:border-emerald-900/30 bg-emerald-50/50 dark:bg-emerald-900/10 text-emerald-700 dark:text-emerald-400 transition-all cursor-pointer">
                        <span class="text-xl mb-1">🏷️</span>
                        <span class="text-[10px] font-bold">{% trans "Gratis" %}</span>
                    </button>
                    <button onclick="toggleMood('family')" data-mood="family" class="mood-btn opacity-60 flex flex-col items-center justify-center p-3 rounded-2xl border border-blue-100 dark:border-blue-900/30 bg-blue-50/50 dark:bg-blue-900/10 text-blue-700 dark:text-blue-400 transition-all cursor-pointer">
                        <span class="text-xl mb-1">👨‍👩‍👧‍👦</span>
                        <span class="text-[10px] font-bold">{% trans "Familia" %}</span>
                    </button>
                    <button onclick="toggleMood('night')" data-mood="night" class="mood-btn opacity-60 flex flex-col items-center justify-center p-3 rounded-2xl border border-purple-100 dark:border-purple-900/30 bg-purple-50/50 dark:bg-purple-900/10 text-purple-700 dark:text-purple-400 transition-all cursor-pointer">
                        <span class="text-xl mb-1">🌙</span>
                        <span class="text-[10px] font-bold">{% trans "Noche" %}</span>
                    </button>
                    <button onclick="toggleMood('rain')" data-mood="rain" class="mood-btn opacity-60 flex flex-col items-center justify-center p-3 rounded-2xl border border-indigo-100 dark:border-indigo-900/30 bg-indigo-50/50 dark:bg-indigo-900/10 text-indigo-700 dark:text-indigo-400 transition-all cursor-pointer">
                        <span class="text-xl mb-1">☂️</span>
                        <span class="text-[10px] font-bold">{% trans "Interior" %}</span>
                    </button>
                    <button onclick="toggleMood('euskara')" data-mood="euskara" class="mood-btn opacity-60 flex flex-col items-center justify-center p-3 rounded-2xl border border-red-100 dark:border-red-900/30 bg-red-50/50 dark:bg-red-900/10 text-red-700 dark:text-red-400 transition-all cursor-pointer">
                        <span class="text-xl mb-1">🗣️</span>
                        <span class="text-[10px] font-bold">{% trans "Euskara" %}</span>
                    </button>
                </div>
            </div>

            <!-- Categories (Visual List) -->
            <div>
                <div class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 px-1">{% trans "Categorías" %}</div>
                <div class="flex flex-wrap gap-2" id="category-filters">
                    <button class="filter-btn active px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex items-center gap-2" data-filter="all" onclick="setCategory('all')">
                        <span>🌈</span> {% trans "Todas" %}
                    </button>
                    <!-- Dinamic categories will be injected here with icons -->
                </div>
            </div>

            <!-- Date Picker (Large Horizontal) -->
            <div>
                <div class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 px-1">{% trans "Cuándo" %}</div>
                <div class="grid grid-cols-4 gap-2" id="date-filters">
                    <button class="filter-btn active py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border border-slate-200 dark:border-slate-700" data-filter="all" onclick="setDate('all')">{% trans "Siempre" %}</button>
                    <button class="filter-btn inactive py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border border-slate-200 dark:border-slate-700" data-filter="today" onclick="setDate('today')">{% trans "Hoy" %}</button>
                    <button class="filter-btn inactive py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border border-slate-200 dark:border-slate-700" data-filter="weekend" onclick="setDate('weekend')">{% trans "Finde" %}</button>
                    <button id="custom-date-btn" class="py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border border-primary/30 text-primary bg-primary/5 relative">
                        {% trans "Rango" %}
                        <input type="text" id="date-range-picker" class="absolute inset-0 opacity-0 cursor-pointer">
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="events-list" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-max">
        <p class="text-slate-500 italic col-span-full">{% trans "Cargando eventos en el mapa..." %}</p>
    </div>

    <!-- Discovery Mode -->
    <div class="px-4 pt-4 pb-20 md:pb-4 border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50">
        <button onclick="surpriseMe()" class="w-full py-3 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold shadow-lg hover:shadow-purple-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
            <span>✨</span> {% trans "¡Sorpréndeme!" %}
        </button>
    </div>
</div>
